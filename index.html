<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromatica — The Visible Spectrum of Stories</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Libre+Baskerville:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }

  #ui-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
  }

  /* Gallery */
  #gallery-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 110px; display: flex; align-items: center;
    padding: 0 32px; gap: 10px;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    pointer-events: all; z-index: 20;
    transition: opacity 0.4s;
  }
  #gallery-label {
    font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(255,255,255,0.35); writing-mode: vertical-rl;
    margin-right: 6px; padding-bottom: 4px;
  }
  #gallery-cards { display: flex; gap: 8px; align-items: flex-end; flex: 1; overflow-x: auto; padding-bottom: 4px; }
  #gallery-cards::-webkit-scrollbar { display: none; }

  .mini-card {
    width: 60px; height: 80px; border-radius: 4px; flex-shrink: 0;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .mini-card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
  .mini-card .mini-num {
    position: absolute; bottom: 4px; left: 0; right: 0; text-align: center;
    font-family: 'DM Mono', monospace; font-size: 0.55rem;
    color: rgba(255,255,255,0.7); letter-spacing: 0.1em;
  }

  #export-btn {
    font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(255,255,255,0.5);
    background: transparent; border: 1px solid rgba(255,255,255,0.2);
    padding: 0.6em 1.2em; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: all 0.3s;
  }
  #export-btn:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

  /* Title */
  #title {
    position: fixed; top: 24px; left: 32px;
    font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 300;
    letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.85);
    pointer-events: none; z-index: 30;
  }

  /* HUD */
  #hud {
    position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
    font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(255,255,255,0.25);
    pointer-events: none; text-align: center;
  }
  #capture-hint {
    position: fixed; top: 28px; right: 32px;
    font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(255,255,255,0.2);
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="ui-overlay">
  <div id="title">Chromatica</div>
  <div id="hud">The Visible Spectrum of Stories</div>
  <div id="capture-hint">Click or press C to capture</div>
</div>

<div id="gallery-panel">
  <div id="gallery-label">Captured</div>
  <div id="gallery-cards"></div>
  <button id="export-btn" onclick="exportAllCards()">Export All ↓</button>
</div>

<script>
// ─────────────────────────────────────────────
// Story Database
// ─────────────────────────────────────────────
const stories = {
  red: [
    { cat: "Pigment History", name: "Vermilion", text: "Ground from cinnabar, vermilion's brilliant scarlet colored imperial robes in ancient China and poison-laced frescoes in Pompeii. Its beauty and toxicity were inseparable." },
    { cat: "Science", name: "Long Wave Red", text: "Red light has the longest wavelength in the visible spectrum, around 700 nanometers. It bends least through a prism, which is why it arcs at the top of every rainbow." },
    { cat: "Symbolism", name: "Red", text: "In pre-Columbian Mesoamerica, red was the color of the east and of life. The same hue, in medieval Europe, marked martyrdom. Color carries geography inside it." },
  ],
  orange: [
    { cat: "Language", name: "Orange", text: "Orange is one of the few colors named for a thing, not the other way around. The fruit came first; before it arrived in Europe, people called this hue 'yellow-red' or 'geoluhread.'" },
    { cat: "Art History", name: "Amber Glow", text: "Turner built entire sunsets from lead-based yellows and orange-reds that deepened over centuries. His late paintings feel almost on fire — partly by design, partly by chemistry." },
    { cat: "Poetic Prompt", name: "Embers", text: "This color asks: what are you still warming yourself by?" },
  ],
  yellow: [
    { cat: "Art History", name: "Chrome Yellow", text: "Van Gogh's yellows were tied to both sunlight and psychic intensity. He painted The Sunflowers in Arles during one of his most productive — and most fragile — periods." },
    { cat: "Science", name: "Yellow", text: "The human eye has more sensitivity to yellow-green light than any other hue. We can distinguish more shades of green-yellow than of any other color in the spectrum." },
    { cat: "Pigment History", name: "Indian Yellow", text: "Indian Yellow, a luminous pigment used in Mughal miniatures, was made from the urine of mango-fed cows. When this was discovered in 1883, its production was soon banned." },
  ],
  green: [
    { cat: "Symbolism", name: "Jade Green", text: "In Han China, jade's green was considered more precious than gold. It linked heaven and earth, and was buried with the dead to slow the body's return to earth." },
    { cat: "Pigment History", name: "Scheele's Green", text: "This vivid Victorian wallpaper green contained arsenic. Thousands of damp Victorian parlors slowly off-gassed poison — including, possibly, Napoleon's bedroom on Saint Helena." },
    { cat: "Literature", name: "Green Light", text: "Fitzgerald's green light at the end of Daisy's dock is one of literature's most condensed symbols: desire, the past, the American dream, all held in a single color at distance." },
  ],
  cyan: [
    { cat: "Science", name: "Cyan", text: "Cyan sits at the edge of what the eye calls 'blue' and 'green.' It's the color of shallow tropical water — the wavelength that penetrates just far enough to bounce back light." },
    { cat: "Culture", name: "Turquoise", text: "The Navajo people call turquoise 'doo yił łigai da' — 'it does not whiten.' It was traded across the Southwest for thousands of years before Spanish contact." },
    { cat: "Poetic Prompt", name: "Open Water", text: "This color asks: what would you do if the horizon had no edge?" },
  ],
  blue: [
    { cat: "Pigment History", name: "Ultramarine", text: "Ultramarine was ground from lapis lazuli imported from Afghanistan and was, ounce for ounce, worth more than gold in Renaissance Europe. Painters saved it for the Virgin's robe." },
    { cat: "Language", name: "Blue", text: "Ancient Greek had no single word for blue. Homer called the sea 'wine-dark.' Some linguists believe a language must have a word for a color before its speakers readily see it." },
    { cat: "Science", name: "Scattered Blue", text: "Blue light scatters more than other wavelengths when it strikes atmospheric particles. The sky isn't blue — it performs blue, diffused endlessly from a sun we can't look at directly." },
  ],
  violet: [
    { cat: "Pigment History", name: "Tyrian Purple", text: "Tyrian purple came from thousands of crushed murex snails to produce a gram of dye. Roman emperors who wore it were literally draped in mollusks — and monopoly." },
    { cat: "Science", name: "Violet Edge", text: "Violet marks the edge of the visible spectrum, where wavelengths approach 380 nanometers. Beyond it, ultraviolet light becomes invisible to us, though bees navigate by it fluently." },
    { cat: "Poetic Prompt", name: "Deep Violet", text: "This color asks: what part of yourself feels almost visible?" },
  ],
};

const hueNames = {
  red: ["Vermilion", "Crimson", "Scarlet", "Deep Red", "Infrared Edge"],
  orange: ["Coral", "Ember", "Amber", "Tangerine", "Rust"],
  yellow: ["Gold", "Marigold", "Sunflower", "Lemon", "Chartreuse Edge"],
  green: ["Jade", "Emerald", "Moss", "Sage", "Viridian"],
  cyan: ["Aqua", "Turquoise", "Teal", "Lagoon", "Cyan"],
  blue: ["Cobalt", "Cerulean", "Ultramarine", "Sapphire", "Sky"],
  violet: ["Indigo", "Amethyst", "Mauve", "Dusk", "Near Ultraviolet"],
};

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let started = true;
let lastCaptureTime = 0;
let capturedCards = [];
let currentCard = null;
let cardAlpha = 0;
let pauseTimer = 0;
let lastMX = -1, lastMY = -1;
let cardSeed = 0;
let particleSystem = [];
let ripples = [];

// ─────────────────────────────────────────────
// p5 Sketch
// ─────────────────────────────────────────────
new p5(function(p) {

  let spectrumBuffer;
  let cardBuffer;
  let customCursor = { x: 0, y: 0, trail: [] };

  p.setup = function() {
    let cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.parent(document.body);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.noStroke();
    p.textFont('Cormorant Garamond');

    spectrumBuffer = p.createGraphics(p.width, p.height);
    drawSpectrum(spectrumBuffer);
    cardBuffer = p.createGraphics(400, 560);

    // init particles
    for (let i = 0; i < 60; i++) {
      particleSystem.push(newParticle());
    }
  };

  function newParticle() {
    return {
      x: p.random(p.width), y: p.random(p.height),
      vx: p.random(-0.3, 0.3), vy: p.random(-0.5, -0.15),
      size: p.random(1, 3.5), life: p.random(100),
      maxLife: p.random(120, 280),
      hue: p.random(0, 320),
    };
  }

  function drawSpectrum(g) {
    g.colorMode(p.HSB, 360, 100, 100, 100);
    for (let x = 0; x <= g.width; x++) {
      let hue = p.map(x, 0, g.width, 0, 280);
      g.stroke(hue, 90, 95);
      g.line(x, 0, x, g.height);
    }
  }

  p.draw = function() {
    if (!started) {
      p.background(0);
      return;
    }

    // Draw spectrum
    p.image(spectrumBuffer, 0, 0);



    // Particles
    updateParticles();

    // Ripples
    updateRipples();

    // Cursor
    let mx = p.mouseX, my = p.mouseY;
    customCursor.x = mx; customCursor.y = my;
    customCursor.trail.push({ x: mx, y: my });
    if (customCursor.trail.length > 18) customCursor.trail.shift();

    // Check pause
    let dist = p.dist(mx, my, lastMX, lastMY);
    if (dist < 4) {
      pauseTimer += p.deltaTime;
    } else {
      pauseTimer = 0;
      // Don't clear card immediately after a capture (gives mouseReleased time to fire)
      if (p.millis() - lastCaptureTime > 500) {
        cardAlpha = p.max(0, cardAlpha - 6);
        currentCard = null;
      }
      lastMX = mx; lastMY = my;
    }

    // Build card after 600ms pause
    if (pauseTimer > 600 && dist < 4) {
      if (!currentCard) {
        currentCard = buildCard(mx, my);
        cardSeed = p.random(1000);
      }
      cardAlpha = p.min(100, cardAlpha + 4);
    }

    // Draw card
    if (currentCard && cardAlpha > 0) {
      drawCard(currentCard, cardAlpha);
    }

    // Draw cursor trail
    drawCursor(mx, my);
  };

  function drawVignette() {
    p.colorMode(p.RGB);
    for (let r = p.min(p.width, p.height) * 0.5; r > 0; r -= 4) {
      let alpha = p.map(r, 0, p.min(p.width, p.height) * 0.5, 60, 0);
      p.fill(0, 0, 0, alpha);
      p.ellipse(p.width / 2, p.height / 2, r * 2.2, r * 1.6);
    }
    p.colorMode(p.HSB, 360, 100, 100, 100);
  }

  function updateParticles() {
    p.colorMode(p.HSB, 360, 100, 100, 100);
    for (let i = particleSystem.length - 1; i >= 0; i--) {
      let pt = particleSystem[i];
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.life++;
      let lifeRatio = pt.life / pt.maxLife;
      let alpha = lifeRatio < 0.1 ? p.map(lifeRatio, 0, 0.1, 0, 35) :
                  lifeRatio > 0.7 ? p.map(lifeRatio, 0.7, 1, 35, 0) : 35;
      p.fill(pt.hue, 60, 95, alpha);
      p.ellipse(pt.x, pt.y, pt.size);
      if (pt.life >= pt.maxLife || pt.y < -10) {
        particleSystem[i] = newParticle();
        particleSystem[i].y = p.height + 5;
      }
    }
  }

  function updateRipples() {
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.noFill();
    for (let i = ripples.length - 1; i >= 0; i--) {
      let r = ripples[i];
      r.radius += 2.5;
      r.life -= 2;
      if (r.life <= 0) { ripples.splice(i, 1); continue; }
      p.stroke(r.hue, 50, 90, r.life * 0.4);
      p.strokeWeight(1);
      p.ellipse(r.x, r.y, r.radius * 2);
    }
    p.noStroke();
  }

  function drawCursor(mx, my) {
    p.colorMode(p.HSB, 360, 100, 100, 100);
    // Trail
    for (let i = 0; i < customCursor.trail.length; i++) {
      let t = customCursor.trail[i];
      let ratio = i / customCursor.trail.length;
      let hue = getHueAtX(t.x);
      p.fill(hue, 70, 98, ratio * 40);
      p.ellipse(t.x, t.y, ratio * 6);
    }
    // Main cursor dot
    let ch = getHueAtX(mx);
    p.fill(ch, 20, 100, 90);
    p.ellipse(mx, my, 12, 12);
    p.fill(ch, 80, 95, 80);
    p.ellipse(mx, my, 5, 5);

    // Outer ring with pause progress
    if (pauseTimer > 200) {
      let prog = p.constrain(pauseTimer / 600, 0, 1);
      p.noFill();
      p.stroke(ch, 60, 98, 60);
      p.strokeWeight(1.2);
      p.arc(mx, my, 22, 22, -p.HALF_PI, -p.HALF_PI + prog * p.TWO_PI);
      p.noStroke();
    }
  }

  function getHueAtX(x) {
    return p.map(x, 0, p.width, 0, 280);
  }

  function getHueFamily(hue) {
    if (hue < 20 || hue > 340) return 'red';
    if (hue < 50) return 'orange';
    if (hue < 75) return 'yellow';
    if (hue < 150) return 'green';
    if (hue < 195) return 'cyan';
    if (hue < 255) return 'blue';
    return 'violet';
  }

  function buildCard(mx, my) {
    let hue = getHueAtX(mx);
    let family = getHueFamily(hue);
    let sat = p.map(Math.abs(my - p.height / 2), 0, p.height / 2, 88, 55);
    let bri = p.map(Math.abs(my - p.height / 2), 0, p.height / 2, 90, 50);

    // Color to hex
    p.colorMode(p.HSB, 360, 100, 100, 100);
    let col = p.color(hue, sat, bri);
    p.colorMode(p.RGB, 255);
    let r = Math.round(p.red(col));
    let g = Math.round(p.green(col));
    let b = Math.round(p.blue(col));
    let hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('').toUpperCase();

    let storyPool = stories[family];
    let story = storyPool[Math.floor(p.random() * storyPool.length)];
    let namePool = hueNames[family];
    let colorName = namePool[Math.floor(p.random() * namePool.length)];

    return { hue, sat, bri, family, hex, r, g, b, story, colorName, mx, my };
  }

  function drawCard(card, alpha) {
    let cw = 340, ch = 480;
    let margin = 24;
    let cx = p.constrain(card.mx + 30, margin, p.width - cw - margin);
    let cy = p.constrain(card.my - ch / 2, margin, p.height - ch - margin - 120);
    let a = alpha / 100;

    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.push();

    // Glassmorphism card background
    p.colorMode(p.RGB, 255);
    let isDark = card.bri < 55;
    let bgAlpha = Math.round(210 * a);
    let cardBg = isDark ? `rgba(15,15,20,${0.82 * a})` : `rgba(245,240,232,${0.88 * a})`;
    let textCol = isDark ? [240, 235, 225] : [20, 18, 15];

    // Draw via drawingContext for glass effect
    let dc = p.drawingContext;
    dc.save();

    // Shadow
    dc.shadowColor = `rgba(0,0,0,${0.4 * a})`;
    dc.shadowBlur = 40;
    dc.shadowOffsetY = 12;

    // Card bg
    dc.fillStyle = isDark ? `rgba(10,10,15,${0.88 * a})` : `rgba(248,244,238,${0.92 * a})`;
    roundRect(dc, cx, cy, cw, ch, 8);

    dc.shadowBlur = 0;
    dc.shadowOffsetY = 0;

    // Color swatch — full width top third
    let swatchH = 160;
    p.colorMode(p.HSB, 360, 100, 100, 100);
    let sc = p.color(card.hue, card.sat, card.bri);
    p.colorMode(p.RGB, 255);
    let sr = p.red(sc), sg = p.green(sc), sb = p.blue(sc);

    // Gradient swatch
    let swatchGrad = dc.createLinearGradient(cx, cy, cx + cw, cy + swatchH);
    swatchGrad.addColorStop(0, `rgba(${Math.min(255,sr+30)},${Math.min(255,sg+30)},${Math.min(255,sb+30)},${a})`);
    swatchGrad.addColorStop(1, `rgba(${Math.max(0,sr-30)},${Math.max(0,sg-30)},${Math.max(0,sb-30)},${a})`);
    dc.fillStyle = swatchGrad;
    dc.beginPath();
    dc.moveTo(cx + 8, cy);
    dc.lineTo(cx + cw - 8, cy);
    dc.quadraticCurveTo(cx + cw, cy, cx + cw, cy + 8);
    dc.lineTo(cx + cw, cy + swatchH);
    dc.lineTo(cx, cy + swatchH);
    dc.lineTo(cx, cy + 8);
    dc.quadraticCurveTo(cx, cy, cx + 8, cy);
    dc.closePath();
    dc.fill();

    // Motif pattern on swatch
    drawMotif(dc, cx, cy, cw, swatchH, card, a);

    // Card body
    let bodyY = cy + swatchH;
    let padX = cx + 24;
    let textA = Math.round(255 * a);

    // Category label
    dc.font = `300 10px 'DM Mono', monospace`;
    dc.letterSpacing = '2.5px';
    dc.fillStyle = `rgba(${textCol.join(',')},${0.4 * a})`;
    dc.fillText(card.story.cat.toUpperCase(), padX, bodyY + 28);

    // Color name
    dc.font = `300 28px 'Cormorant Garamond', serif`;
    dc.letterSpacing = '1px';
    dc.fillStyle = `rgba(${textCol.join(',')},${0.9 * a})`;
    dc.fillText(card.colorName, padX, bodyY + 62);

    // HEX / RGB
    dc.font = `300 10px 'DM Mono', monospace`;
    dc.letterSpacing = '1.5px';
    dc.fillStyle = `rgba(${textCol.join(',')},${0.35 * a})`;
    dc.fillText(`${card.hex}   RGB(${card.r},${card.g},${card.b})`, padX, bodyY + 86);

    // Divider
    dc.strokeStyle = `rgba(${textCol.join(',')},${0.12 * a})`;
    dc.lineWidth = 1;
    dc.beginPath();
    dc.moveTo(padX, bodyY + 100);
    dc.lineTo(cx + cw - 24, bodyY + 100);
    dc.stroke();

    // Story text
    dc.font = `italic 300 13.5px 'Cormorant Garamond', serif`;
    dc.letterSpacing = '0.3px';
    dc.fillStyle = `rgba(${textCol.join(',')},${0.75 * a})`;
    wrapText(dc, card.story.text, padX, bodyY + 130, cw - 48, 22);

    // Bottom — capture hint
    dc.font = `300 9px 'DM Mono', monospace`;
    dc.letterSpacing = '2px';
    dc.fillStyle = `rgba(${textCol.join(',')},${0.25 * a})`;
    dc.fillText('CLICK TO CAPTURE', cx + cw / 2 - 52, cy + ch - 16);

    dc.restore();
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pop();
  }

  function drawMotif(dc, cx, cy, cw, ch, card, a) {
    dc.save();
    dc.beginPath();
    dc.rect(cx, cy, cw, ch);
    dc.clip();

    let family = card.family;
    let hue = card.hue;
    p.colorMode(p.HSB, 360, 100, 100, 100);
    let lc = p.color(hue, 30, 100);
    p.colorMode(p.RGB, 255);
    let lr = p.red(lc), lg = p.green(lc), lb = p.blue(lc);

    dc.strokeStyle = `rgba(${lr},${lg},${lb},${0.18 * a})`;
    dc.lineWidth = 1;
    dc.setLineDash([]);

    if (family === 'blue' || family === 'cyan') {
      // Wave lines
      for (let i = 0; i < 5; i++) {
        let yOff = cy + ch * 0.3 + i * 14;
        dc.beginPath();
        for (let x = cx; x <= cx + cw; x += 3) {
          let y = yOff + Math.sin((x - cx) * 0.04 + i * 0.7 + cardSeed) * 8;
          x === cx ? dc.moveTo(x, y) : dc.lineTo(x, y);
        }
        dc.stroke();
      }
    } else if (family === 'red' || family === 'orange') {
      // Radiating lines
      let ox = cx + cw * 0.8, oy = cy + ch * 0.2;
      for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 10) {
        dc.beginPath();
        dc.moveTo(ox, oy);
        dc.lineTo(ox + Math.cos(angle) * 180, oy + Math.sin(angle) * 180);
        dc.stroke();
      }
    } else if (family === 'green') {
      // Organic curves
      for (let i = 0; i < 4; i++) {
        dc.beginPath();
        let x0 = cx + cw * 0.1, y0 = cy + ch * (0.3 + i * 0.15);
        dc.moveTo(x0, y0);
        dc.bezierCurveTo(
          cx + cw * 0.35, y0 - 25,
          cx + cw * 0.65, y0 + 25,
          cx + cw * 0.9, y0
        );
        dc.stroke();
      }
    } else if (family === 'violet') {
      // Concentric arcs
      for (let r = 20; r < 120; r += 18) {
        dc.beginPath();
        dc.arc(cx + cw * 0.85, cy + ch * 0.15, r, 0, Math.PI * 1.5);
        dc.stroke();
      }
    } else if (family === 'yellow') {
      // Cross-hatch
      for (let i = -ch; i < cw + ch; i += 18) {
        dc.beginPath();
        dc.moveTo(cx + i, cy);
        dc.lineTo(cx + i - ch, cy + ch);
        dc.stroke();
        dc.beginPath();
        dc.moveTo(cx + i, cy);
        dc.lineTo(cx + i + ch, cy + ch);
        dc.stroke();
      }
    } else {
      // Dots
      for (let x = cx + 20; x < cx + cw - 20; x += 20) {
        for (let y = cy + 20; y < cy + ch - 20; y += 20) {
          dc.beginPath();
          dc.arc(x, y, 2, 0, Math.PI * 2);
          dc.fill();
        }
      }
    }
    dc.restore();
  }

  function roundRect(dc, x, y, w, h, r) {
    dc.beginPath();
    dc.moveTo(x + r, y);
    dc.lineTo(x + w - r, y);
    dc.quadraticCurveTo(x + w, y, x + w, y + r);
    dc.lineTo(x + w, y + h - r);
    dc.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    dc.lineTo(x + r, y + h);
    dc.quadraticCurveTo(x, y + h, x, y + h - r);
    dc.lineTo(x, y + r);
    dc.quadraticCurveTo(x, y, x + r, y);
    dc.closePath();
    dc.fill();
  }

  function wrapText(dc, text, x, y, maxW, lineH) {
    let words = text.split(' ');
    let line = '';
    for (let w of words) {
      let test = line + w + ' ';
      let metrics = dc.measureText(test);
      if (metrics.width > maxW && line !== '') {
        dc.fillText(line, x, y);
        line = w + ' ';
        y += lineH;
      } else {
        line = test;
      }
    }
    dc.fillText(line, x, y);
  }

  // Capture card
  function captureCurrentCard() {
    if (!currentCard || capturedCards.length >= 16) return;
    lastCaptureTime = p.millis();
    capturedCards.push({ ...currentCard });

    // Add ripple
    ripples.push({ x: currentCard.mx, y: currentCard.my, radius: 10, life: 80, hue: currentCard.hue });

    // Update mini gallery
    let gcEl = document.getElementById('gallery-cards');
    let mini = document.createElement('div');
    mini.className = 'mini-card';
    p.colorMode(p.HSB, 360, 100, 100, 100);
    let sc = p.color(currentCard.hue, currentCard.sat, currentCard.bri);
    p.colorMode(p.RGB, 255);
    mini.style.background = `rgb(${Math.round(p.red(sc))},${Math.round(p.green(sc))},${Math.round(p.blue(sc))})`;
    mini.innerHTML = `<div class="mini-num">${capturedCards.length}</div>`;
    gcEl.appendChild(mini);
    gcEl.scrollLeft = gcEl.scrollWidth;
    p.colorMode(p.HSB, 360, 100, 100, 100);
  }

  // Key capture
  p.keyPressed = function() {
    if (p.key === 'c' || p.key === 'C') captureCurrentCard();
    if (p.key === 'e' || p.key === 'E') exportAllCards();
  };

  // Click capture
  p.mouseReleased = function() {
    let btn = window._exportBtnBounds;
    if (btn && p.mouseX >= btn.x && p.mouseX <= btn.x + btn.w &&
               p.mouseY >= btn.y && p.mouseY <= btn.y + btn.h) {
      exportAllCards(); return;
    }
    if (started && currentCard) captureCurrentCard();
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    drawSpectrum(spectrumBuffer);
  };

  // Expose to global
  window.captureCurrentCard = captureCurrentCard;
  window.getCapturedCards = () => capturedCards;
  window.p5instance = p;

}); // end p5

// ── Export ────────────────────────────────────────────────────
// Renders each card to an offscreen canvas and downloads as PNG.
// Also downloads a summary HTML page.

function renderCardToCanvas(card, index) {
  let cw = 640, ch = 920, swH = 300;
  let canvas = document.createElement('canvas');
  canvas.width = cw; canvas.height = ch;
  let dc = canvas.getContext('2d');

  let isDark = card.bri < 55;
  dc.fillStyle = isDark ? 'rgb(10,10,15)' : 'rgb(248,244,238)';
  dc.fillRect(0, 0, cw, ch);

  // Swatch gradient
  let grad = dc.createLinearGradient(0, 0, cw, 0);
  grad.addColorStop(0, `rgb(${Math.min(255,card.r+30)},${Math.min(255,card.g+30)},${Math.min(255,card.b+30)})`);
  grad.addColorStop(1, `rgb(${Math.max(0,card.r-30)},${Math.max(0,card.g-30)},${Math.max(0,card.b-30)})`);
  dc.fillStyle = grad;
  dc.fillRect(0, 0, cw, swH);

  let tc = isDark ? '240,235,225' : '20,18,15';
  let px = 44, bodyY = swH;

  // Category
  dc.font = "300 18px 'DM Mono', monospace";
  dc.letterSpacing = '5px';
  dc.fillStyle = `rgba(${tc},0.45)`;
  dc.fillText(card.story.cat.toUpperCase(), px, bodyY + 52);

  // Color name
  dc.font = "300 52px 'Cormorant Garamond', Georgia, serif";
  dc.letterSpacing = '1px';
  dc.fillStyle = `rgba(${tc},0.92)`;
  dc.fillText(card.colorName, px, bodyY + 115);

  // HEX / RGB
  dc.font = "300 18px 'DM Mono', monospace";
  dc.letterSpacing = '2px';
  dc.fillStyle = `rgba(${tc},0.35)`;
  dc.fillText(`${card.hex}   RGB(${card.r}, ${card.g}, ${card.b})`, px, bodyY + 156);

  // Divider
  dc.strokeStyle = `rgba(${tc},0.14)`;
  dc.lineWidth = 1;
  dc.beginPath();
  dc.moveTo(px, bodyY + 184); dc.lineTo(cw - px, bodyY + 184);
  dc.stroke();

  // Story text — wrapped
  dc.font = "italic 300 26px 'Cormorant Garamond', Georgia, serif";
  dc.letterSpacing = '0.3px';
  dc.fillStyle = `rgba(${tc},0.78)`;
  let words = card.story.text.split(' '), line = '', ty = bodyY + 236, maxW = cw - px * 2, lineH = 42;
  for (let w of words) {
    let test = line + w + ' ';
    if (dc.measureText(test).width > maxW && line !== '') {
      dc.fillText(line, px, ty); line = w + ' '; ty += lineH;
    } else { line = test; }
  }
  dc.fillText(line, px, ty);

  // Watermark
  dc.font = "300 16px 'DM Mono', monospace";
  dc.letterSpacing = '5px';
  dc.fillStyle = `rgba(${tc},0.18)`;
  dc.fillText('CHROMATICA', cw / 2 - 68, ch - 28);

  return canvas;
}

function exportSingleCard(card, index) {
  let canvas = renderCardToCanvas(card, index);
  let a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `chromatica-${String(index+1).padStart(2,'0')}-${card.colorName.toLowerCase().replace(/\s+/g,'-')}.png`;
  a.click();
}

function exportAllCards() {
  let cards = window.getCapturedCards ? window.getCapturedCards() : [];
  if (cards.length === 0) {
    alert('Capture some color cards first — hover and hold, then click!');
    return;
  }
  // Download each card as a PNG, staggered so browser allows all
  cards.forEach((card, i) => {
    setTimeout(() => exportSingleCard(card, i), i * 400);
  });
  // Also download summary HTML page
  setTimeout(() => {
    let html = `<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>Chromatica — ${cards.length} Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
      body{background:#0a0a0c;font-family:'Cormorant Garamond',serif;color:#f5f0e8;padding:48px;}
      h1{font-size:2rem;font-weight:300;letter-spacing:.22em;text-transform:uppercase;margin-bottom:6px;}
      .sub{font-family:'DM Mono',monospace;font-size:.65rem;color:rgba(245,240,232,.3);letter-spacing:.2em;margin-bottom:48px;}
      .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;}
      .card{border-radius:6px;overflow:hidden;background:rgba(255,255,255,.04);}
      .swatch{height:130px;}
      .info{padding:18px 20px;}
      .cat{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.2em;color:rgba(245,240,232,.38);margin-bottom:8px;}
      .name{font-size:1.45rem;font-weight:300;margin-bottom:5px;}
      .hex{font-family:'DM Mono',monospace;font-size:.6rem;color:rgba(245,240,232,.3);margin-bottom:14px;}
      .story{font-size:.88rem;font-style:italic;line-height:1.7;color:rgba(245,240,232,.68);}
    </style></head><body>
    <h1>Chromatica</h1>
    <div class="sub">Sixteen Stops Along the Spectrum — ${cards.length} Captured</div>
    <div class="grid">`;
    cards.forEach((c, i) => {
      html += `<div class="card">
        <div class="swatch" style="background:linear-gradient(to right,rgb(${Math.min(255,c.r+30)},${Math.min(255,c.g+30)},${Math.min(255,c.b+30)}),rgb(${Math.max(0,c.r-30)},${Math.max(0,c.g-30)},${Math.max(0,c.b-30)}))"></div>
        <div class="info">
          <div class="cat">${String(i+1).padStart(2,'0')} — ${c.story.cat}</div>
          <div class="name">${c.colorName}</div>
          <div class="hex">${c.hex} &nbsp;&nbsp; RGB(${c.r}, ${c.g}, ${c.b})</div>
          <div class="story">${c.story.text}</div>
        </div></div>`;
    });
    html += `</div></body></html>`;
    let blob = new Blob([html], { type: 'text/html' });
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'chromatica-all-cards.html';
    a.click();
  }, cards.length * 400 + 200);
}
</script>
